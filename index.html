<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Salam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      line-height: 1.5;
      background: #52eb52;
      color: #f9fffa;
    }

    h1, h2, h3, h4, h5, h6 {
      margin: 16px 0 8px;
    }

    hr {
      border: none;
      height: 1px;
      background: #cbd7cb;
      margin: 12px 0;
    }

    .button-link {
      display: inline-block;
      text-decoration: none;
      margin-top: 24px;
    }

    .button-link button {
      background-color: #1a3e1c;
      color: #394141;
      padding: 14px 24px;
      border: none;
      cursor: pointer;
      border-radius: 100px;
      font-size: 18px;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .button-link button:hover {
      transform: scale(1.05);
      background-color: #13502f;
    }
  </style>
</head>
<body>
  <h1>Mənim günüm</h1>
  <hr>
  <h2>Səhər</h2>
  <hr>
  <h3>Yuxudan oyanma</h3>
  <hr>
  <h4>Səhər yeməyi</h4>
  <hr>
  <h5>Məktəbə hazırlıq</h5>
  <hr>
  <h6>Evə qayıdış</h6>
  <a class="button-link" href="https://www.youtube.com" target="_blank" rel="noreferrer noopener">
    <button class="inde_11" onclick="alert('fexreddin seni gordü abovv')">Youtubeye getmək üçün bu butona bas</button>
  </a>
</body>
</html>
