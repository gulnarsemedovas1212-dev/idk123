<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Meet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="meeting-shell">
    <header class="meeting-header">
      <div class="meeting-title">
        <span class="meeting-badge">Meet</span>
        <div>
          <h1>Camera Meeting</h1>
          <p id="roomSubtitle">Create a room and share the invite code.</p>
        </div>
      </div>
      <div class="meeting-room-code">
        <span>Room code</span>
        <strong id="roomCode">No room</strong>
      </div>
    </header>

    <div class="meeting-layout">
      <aside class="meeting-sidebar">
        <section class="panel invite-panel">
          <h2>Invite people</h2>
          <div class="invite-row">
            <button id="generateInviteBtn">Generate Room</button>
            <span id="inviteCode" class="invite-code">No invite generated</span>
          </div>

          <div class="invite-row">
            <input id="inviteInput" type="text" placeholder="Enter invite code" />
            <button id="joinBtn">Join Room</button>
          </div>

          <div id="inviteMessage" class="message">Generate an invite code and share it with people you want to join.</div>
        </section>

        <section class="panel participants-panel">
          <h2>Participants</h2>
          <ul id="participantList" class="participant-list">
            <li class="participant-item inactive">Waiting for the room to start.</li>
          </ul>
        </section>
      </aside>

      <main class="meeting-main">
        <section class="video-panel">
          <div class="video-card">
            <div class="video-label">Your camera</div>
            <video id="video" autoplay playsinline muted></video>
          </div>
          <div id="cameraHint" class="camera-hint">Generate a room and join to start the camera.</div>
        </section>
      </main>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
